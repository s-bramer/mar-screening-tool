project:
  name: "MAR-ST Phase 1 — Spatial Suitability Screening"
  crs_analysis: 27700       # OSGB36 BNG — all processing done in this CRS
  crs_display: 4326         # WGS84 — reproject only at visualisation layer

grid:
  resolution_m: 1000        # 1 km initial resolution (~21,000 cells in ST area)

paths:
  data: data
  processed: processed

# ---------------------------------------------------------------------------
# Data sources
# ---------------------------------------------------------------------------
data_sources:
  study_boundary:
    path: data/shapes/ST_catchment_area.shp
    label: "Severn Trent Supply Area"

  hydrogeology_625k:
    path: data/BGS/BGS_Hydrogeology_625k/HydrogeologyUK_IoM_v5.shp
    assumed_crs: 27700      # PRJ confirms BNG; EPSG tag absent from WKT
    class_field: CLASS
    character_field: CHARACTER
    label: "Aquifer Classification (BGS 625K)"

  bedrock_geology:
    path: data/BGS/BGS_Geology_625k_Shapefile/Bedrock/625k_V5_BEDROCK_Geology_Polygons.shp
    assumed_crs: 27700
    name_field: LEX_D
    label: "Bedrock Geology (BGS 625K)"

  superficial_geology:
    path: data/BGS/BGS_Geology_625k_Shapefile/Superficial/UK_625k_SUPERFICIAL_Geology_Polygons.shp
    assumed_crs: 27700
    name_field: LEX_D
    label: "Superficial Geology (BGS 625K)"

  gwmu:
    path: data/EA/Groundwater_Management_Units.shp
    name_field: gwmu_name
    cams_field: cams_area
    label: "Groundwater Management Units (EA)"

  sw_catchments:
    path: data/EA/WFD_Surface_Water_Management_Catchments_Cycle_2.shp
    name_field: mncat_name
    label: "SW Management Catchments (WFD Cycle 2)"

  os_rivers:
    path: data/OS/data/WatercourseLink.shp
    assumed_crs: 27700
    label: "Rivers (OS Open Rivers)"

  gwdte:
    path: data/EA/England_only_GWDTEs.shp
    name_field: GWDTE_NAME
    site_field: site_name
    label: "GWDTEs (EA)"

  superficial_thickness:
    path: data/BGS/Superficial_Deposits_Thickness/Superficial_Deposits_Thickness_Model_1km_hex_grid.gpkg
    layer: BGS_SDTM_1km_Coverage
    label: "Superficial Deposits Thickness Model (BGS SDTM 1km)"

  gwm:
    path: data/GWMs/gmw_boundaries.shp
    label: "Regional Groundwater Model Boundaries"

# ---------------------------------------------------------------------------
# Scoring — Geological Suitability
# ---------------------------------------------------------------------------
# BGS Hydrogeology 625K: CHARACTER field → suitability score (0–10)
# Assumption: 'Low productive' and 'Low productivity' are both treated as score 2
# (typo variant in the dataset — treated identically)
# ---------------------------------------------------------------------------
# Scoring — Superficial Deposits Thickness (BGS SDTM)
# ---------------------------------------------------------------------------
# Piecewise linear between breakpoints.
# Rationale:
#   0–2 m   thin/absent — limited natural filtration for infiltration MAR
#   2–15 m  optimal window — adequate treatment depth + permeable pathway
#   >15 m   declining suitability — risk of confining clay layers
# Score is further weighted by COVER_PCT (fractional cell coverage, floor 0.3).
# Assumption: all superficial deposits are permeable (conservative upper bound).
# Revise after lithology review of BGS 625K superficial geology.
sdtm_scoring:
  breakpoints_m: [0,  1,  3,  8, 15, 25, 40, 50]
  scores:        [4,  5,  8, 10,  8,  4,  2,  1]

# ---------------------------------------------------------------------------
# Scoring — Geological Suitability (hydrogeology)
# ---------------------------------------------------------------------------
hydrogeology_scores:
  "Highly productive aquifer": 10
  "Moderately productive aquifer": 6
  "Low productivity aquifer": 2
  "Low productive aquifer": 2          # variant spelling present in dataset
  "Rocks with essentially no groundwater": 0

# Normalised weights for sub-criteria within Geological Suitability theme
# Placeholder — to be set via AHP workshop with ST team
geological_criteria_weights:
  hydro_classification: 1.0            # only criterion available at Phase 1

# ---------------------------------------------------------------------------
# MCE Theme Weights  (must sum to 1.0)
# Placeholder — to be refined via AHP pairwise comparison
# ---------------------------------------------------------------------------
mce:
  themes:
    need_for_mar:
      weight: 0.33
      label: "Need for MAR"
    geological_suitability:
      weight: 0.34
      label: "Geological Suitability"
    water_availability:
      weight: 0.33
      label: "Water Availability"

# ---------------------------------------------------------------------------
# Hard Constraints  (Boolean — excluded cells score 0 on composite)
# ---------------------------------------------------------------------------
constraints:
  exclude_non_productive: true
  exclude_gwdte: true
  # Future constraints to add:
  #   - Groundwater flooding areas
  #   - Contaminated land / landfill
  #   - Surface water bodies
  #   - Source Protection Zones (SPZ1)

# ---------------------------------------------------------------------------
# Dashboard
# ---------------------------------------------------------------------------
dashboard:
  title: "MAR-ST Suitability Screening Tool"
  theme: "default"
  map_height: 650
  sidebar_width: 320
