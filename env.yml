name: mar-st
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Spatial analysis
  - geopandas>=1.0
  - rasterio>=1.3
  - rioxarray>=0.15
  - xarray>=2024.0
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
