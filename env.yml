  - numpy>=1.26
  - scipy>=1.12
  # Data handling
  - pandas>=2.1
  - openpyxl>=3.1
  - pyyaml>=6.0
  # Visualisation / Dashboard
  - panel>=1.3
  - hvplot>=0.9
  - holoviews>=1.18
  - geoviews>=1.11
  - bokeh>=3.3
  - param>=2.0
  - colorcet>=3.0
  - datashader>=0.16
  # Mapping / Plotting
  - folium>=0.15
  - matplotlib>=3.8
  - seaborn>=0.13
  # Testing
  - pytest>=7.4
